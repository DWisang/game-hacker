const navItems=[["dashboard","Dashboard","⌁"],["quests","Quest","◆"],["terminal","Terminal","▣"],["dungeon","Dungeon","▦"],["battle","Battle","⚔"],["shop","Shop","₿"],["inventory","Inventory","▤"],["skills","Skills","✦"],["map","Network Map","◎"],["achievements","Achievements","★"],["logs","Activity Log","≡"]];

let state=loadGame(),currentView="dashboard",miniGame=null,signalTimer=null,memoryTimer=null,terminalBooted=false;
function clone(x){return JSON.parse(JSON.stringify(x))}function clamp(n,min,max){return Math.max(min,Math.min(max,n))}function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}function pick(a){return a[rand(0,a.length-1)]}function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function fmt(n){return Math.floor(n).toLocaleString("id-ID")}function todayKey(){return new Date().toISOString().slice(0,10)}
function mergeDeep(base,saved){const out=clone(base);if(!saved||typeof saved!=="object")return out;for(const k in saved){if(saved[k]&&typeof saved[k]==="object"&&!Array.isArray(saved[k])&&out[k]&&typeof out[k]==="object"&&!Array.isArray(out[k]))out[k]=mergeDeep(out[k],saved[k]);else out[k]=saved[k]}return out}
function loadGame(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)return mergeDeep(defaultState,JSON.parse(raw))}catch(e){console.warn("Save disabled:",e)}return clone(defaultState)}
function saveGame(show=false){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));if(show)toast("Progress disimpan di browser.")}catch(e){if(show)toast("Save tidak aktif di browser/sandbox ini.")}}
function resetGame(){if(!confirm("Reset semua progress game?"))return;try{localStorage.removeItem(STORAGE_KEY)}catch(e){}state=clone(defaultState);currentView="dashboard";terminalBooted=false;showView("dashboard");toast("Progress direset.")}

function toast(msg){const el=$("toast");if(!el)return;el.innerHTML=msg;el.classList.add("show");clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove("show"),2600)}
function getRank(){let r=ranks[0][1];for(const [need,name]of ranks)if(state.rep>=need)r=name;return r}function totalStat(key){return Object.values(state.owned).reduce((a,it)=>a+Number(it[key]||0),0)}function skillBonus(key){return state.skills[key]||0}function toggleSidebar(open){$("sidebar").classList.toggle("open",open);$("overlay").classList.toggle("show",open)}
function addHeat(amount){const reduction=skillBonus("stealth")*2+totalStat("stealth")*.15;state.heat=clamp(state.heat+Math.ceil(amount-reduction),0,100);if(state.heat>=100){state.heat=72;state.stats.lockdowns++;let fine=220+state.level*80;if(state.owned.tool_vault)fine=Math.floor(fine*.45);fine=Math.min(state.crypto,fine);state.crypto-=fine;state.rep=Math.max(0,state.rep-(state.owned.tool_vault?10:30));log(`TRACE LOCKDOWN! Crypto hilang ₿${fmt(fine)}.`);toast("TRACE LOCKDOWN! Kamu berhasil kabur, tapi kena penalti.")}}

function renderTop(){$("aliasText").textContent=state.alias;$("rankText").textContent=getRank();$("heatPill").textContent=`HEAT ${Math.floor(state.heat)}%`;$("ticker").innerHTML=`> ${state.alias}@neon · Lv ${state.level} · REP ${fmt(state.rep)} · ₿${fmt(state.crypto)} · ${state.activeQuest?"Quest: "+state.activeQuest.title:"No active quest"} <span class="scanline">_</span>`}

function renderDashboard(){const expPct=state.exp/state.expNeed*100,heatText=state.heat<26?"Aman":state.heat<51?"Terpantau":state.heat<76?"Diburu":"Red Alert";$("dashboard").innerHTML=`<div class="grid">${statCard("Level",state.level,`${fmt(state.exp)}/${fmt(state.expNeed)} EXP`,expPct,"purple")}${statCard("Crypto",`₿${fmt(state.crypto)}`,"Mata uang underground")}${statCard("Energy",`${Math.floor(state.energy)}/${Math.floor(state.maxEnergy)}`,"Quest & dungeon",state.energy/state.maxEnergy*100)}${statCard("Heat",`${Math.floor(state.heat)}%`,heatText,state.heat,"red")}<div class="card span-8"><h2>Dashboard Operasi</h2><p>Kamu adalah <b>${state.alias}</b>, hacker fiktif di Neon District. Jalankan quest random mini game, masuk dungeon, upgrade skill, beli tool, dan bongkar rahasia AUREX Corp.</p><div class="actions"><button class="btn primary" data-go="quests">Ambil Quest</button><button class="btn purple" data-go="terminal">Terminal</button><button class="btn warn" data-action="rest">Rest</button><button class="btn" data-action="daily">Daily Reward</button><button class="btn" data-action="random">Random Event</button></div></div><div class="card span-4"><h2>Profil</h2><div class="stat"><span>Rank</span><span class="value">${getRank()}</span></div><div class="stat"><span>Reputation</span><span class="value">${fmt(state.rep)}</span></div><div class="stat"><span>Skill Point</span><span class="value">${state.skillPoints}</span></div><div class="stat"><span>Story Chapter</span><span class="value">${state.story}</span></div><div class="stat"><span>Quest Clear</span><span class="value">${state.stats.quests}</span></div></div><div class="card span-6"><h2>Active Quest</h2>${state.activeQuest?questHTML(state.activeQuest,true):`<p>Belum ada quest aktif.</p>`}</div><div class="card span-6"><h2>Quick Log</h2><div class="logbox">${state.logs.slice(-8).map(x=>`<div class="item">${x}</div>`).join("")}</div></div></div>`}
function questHTML(q,active=false){return `<div class="item"><div class="item-head"><div><b>${q.title}</b><p>${q.desc}</p></div><span class="tag ${q.type==="High Risk"?"red":q.type==="Main"?"yellow":""}">${q.type}</span></div><div class="stat"><span>Reward</span><span class="value">₿${fmt(q.reward.crypto)} · ${q.reward.exp} EXP · ${q.reward.rep} REP</span></div><div class="stat"><span>Cost / Risk</span><span>Energy ${q.energy} · Heat +${q.heat}</span></div><div class="actions">${active?`<button class="btn primary" data-action="startQuest">Start Random Mini Game</button><button class="btn danger" data-action="cancelQuest">Cancel</button>`:`<button class="btn primary" data-quest="${q.id}">Accept</button>`}</div></div>`}
function renderQuests(){$("quests").innerHTML=`<div class="grid"><div class="card span-12"><h2>Quest Board</h2><p>Setiap quest memakai mini game random: Breach Sequence, Word Guess, Node Capture, Pipe Flow, Signal Timing, Memory Packet, Data Sorting, Stealth Route, atau Firewall Pattern.</p></div><div class="card span-12"><div class="list">${questPool.map(q=>questHTML(q,state.activeQuest&&state.activeQuest.id===q.id)).join("")}</div></div></div>`}
function acceptQuest(id){const q=questPool.find(x=>x.id===id);state.activeQuest=clone(q);log(`Quest diterima: ${q.title}.`);renderAll();toast("Quest aktif.")}function cancelQuest(){if(!state.activeQuest)return;log(`Quest dibatalkan: ${state.activeQuest.title}.`);state.activeQuest=null;renderAll()}function startActiveQuest(){if(!state.activeQuest){toast("Tidak ada quest aktif.");return}const q=state.activeQuest;if(!spendEnergy(q.energy))return;miniGame=createRandomMiniGame(q);openMiniGame()}
function createRandomMiniGame(q){return pick([createBreachSequence,createWordGuess,createNodeCapture,createPipeFlow,createSignalTiming,createMemoryPacket,createDataSorting,createStealthRoute,createFirewallPattern])(q)}function miniHeader(title,type){return `<div class="mini-title"><h2 style="margin:0">${title}</h2><span class="mini-badge">${type}</span></div>`}function openMiniGame(){clearInterval(signalTimer);clearTimeout(memoryTimer);const map={breach:renderBreachMiniGame,word:renderWordGuessMiniGame,node:renderNodeCaptureMiniGame,pipe:renderPipeFlowMiniGame,signal:renderSignalTimingMiniGame,memory:renderMemoryPacketMiniGame,sorting:renderDataSortingMiniGame,route:renderStealthRouteMiniGame,pattern:renderFirewallPatternMiniGame};if(miniGame&&map[miniGame.type])map[miniGame.type]();$("modal").classList.add("show")}
function finishMiniGame(success,detail=""){clearInterval(signalTimer);clearTimeout(memoryTimer);const q=state.activeQuest;if(!q){closeModal();return}const bonus=skillBonus("cracking")*2+skillBonus("ai")*2+totalStat("power")*.25;if(!success&&Math.random()*100<bonus){success=true;log("MIRA membantu menyelamatkan mini game yang hampir gagal.")}if(success){gain(q.reward);addHeat(Math.floor(q.heat*.45));state.stats.quests++;state.stats.minigames++;log(`Quest sukses: ${q.title}. Mini game: ${miniGame.name}. ${detail}`);state.activeQuest=null;toast(`MISSION SUCCESS: ${miniGame.name}`)}else{addHeat(q.heat+8);state.rep=Math.max(0,state.rep-5);log(`Quest gagal: ${q.title}. Mini game: ${miniGame.name}. ${detail}`);state.activeQuest=null;toast(`MISSION FAILED: ${miniGame.name}`)}miniGame=null;checkAchievements();closeModal();renderAll()}
function closeModal(){clearInterval(signalTimer);clearTimeout(memoryTimer);$("modal").classList.remove("show")}
function createBreachSequence(q){const tokens=["A1","7X","B4","C9","D2","F0","9Z","K3","R8","N6"],len=clamp(2+q.difficulty,3,6),target=Array.from({length:len},()=>pick(tokens));return{type:"breach",name:"Breach Sequence",target,grid:shuffle([...target,...Array.from({length:12},()=>pick(tokens))]).slice(0,12),selected:[]}}function renderBreachMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Breach Sequence","GRID CODE")}<p>Pilih kode dari grid untuk menyusun sequence target.</p><div class="mini-sequence">TARGET: ${miniGame.target.join(" → ")}</div><div class="mini-sequence">INPUT: ${miniGame.selected.length?miniGame.selected.join(" → "):"-"}</div><div class="mini-grid cols-4">${miniGame.grid.map((t,i)=>`<button class="mini-cell" data-breach="${i}">${t}</button>`).join("")}</div><div class="actions"><button class="btn warn" data-action="breachUndo">Undo</button><button class="btn danger" data-action="abortMini">Abort</button></div>`}function breachPick(i){miniGame.selected.push(miniGame.grid[i]);const pos=miniGame.selected.length-1;if(miniGame.selected[pos]!==miniGame.target[pos])return finishMiniGame(false,"Sequence salah.");if(miniGame.selected.length===miniGame.target.length)return finishMiniGame(true,"Sequence cocok.");renderBreachMiniGame()}function breachUndo(){miniGame.selected.pop();renderBreachMiniGame()}
function createWordGuess(q){const words=["TRACE","CACHE","LOGIN","PROXY","TOKEN","ROUTE","PATCH","CLOUD","SHELL","CRYPT","VIRUS","QUERY"],answer=pick(words);let list=shuffle(words).slice(0,8);if(!list.includes(answer))list[0]=answer;return{type:"word",name:"Terminal Word Guess",words:shuffle(list),answer,attempts:4+Math.max(0,2-q.difficulty),hints:[]}}function renderWordGuessMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Terminal Word Guess","PASSWORD")}<p>Pilih password. Hint menunjukkan huruf benar di posisi benar.</p><div class="mini-sequence">Attempts: ${miniGame.attempts}</div><div class="mini-grid cols-2">${miniGame.words.map(w=>`<button class="mini-cell" data-word="${w}">${w}</button>`).join("")}</div><div class="mini-sequence">${miniGame.hints.length?miniGame.hints.map(h=>`<div>${h}</div>`).join(""):"Belum ada hint."}</div>`}function wordGuess(word){if(word===miniGame.answer)return finishMiniGame(true,"Password benar.");let match=0;for(let i=0;i<word.length;i++)if(word[i]===miniGame.answer[i])match++;miniGame.attempts--;miniGame.hints.push(`${word}: ${match}/${miniGame.answer.length} huruf benar`);if(miniGame.attempts<=0)return finishMiniGame(false,`Jawaban: ${miniGame.answer}.`);renderWordGuessMiniGame()}
function createNodeCapture(q){const path=["HOME","PROXY","CACHE","FIREWALL","ROOT"],decoys=["TRAP","HONEYPOT","TRACE","MIRROR","NOISE","DECOY"];return{type:"node",name:"Node Capture",path,nodes:shuffle([...path.slice(1),...decoys.slice(0,4)]),step:1,trace:0,maxTrace:3+Math.max(0,3-q.difficulty)}}function renderNodeCaptureMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Node Capture","NETWORK")}<p>Capture node sesuai jalur aman sebelum trace penuh.</p><div class="mini-sequence">PATH: ${miniGame.path.slice(0,miniGame.step).join(" → ")} → ?</div><div class="mini-sequence">TRACE: ${miniGame.trace}/${miniGame.maxTrace}</div><div class="mini-grid cols-3">${miniGame.nodes.map(n=>`<button class="mini-cell" data-node="${n}">${n}</button>`).join("")}</div>`}function nodePick(node){if(node===miniGame.path[miniGame.step]){miniGame.step++;if(miniGame.step>=miniGame.path.length)return finishMiniGame(true,"Root node berhasil dikuasai.")}else{miniGame.trace++;addHeat(2);if(miniGame.trace>=miniGame.maxTrace)return finishMiniGame(false,"Trace mencapai HOME node.")}renderNodeCaptureMiniGame()}
function createPipeFlow(q){const pieces=["─","│","┌","┐","└","┘"],answer=["─","┐","│","┘"];return{type:"pipe",name:"Pipe Data Flow",pieces,answer,current:shuffle(pieces).slice(0,4),moves:8+Math.max(0,3-q.difficulty)}}function renderPipeFlowMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Pipe Data Flow","FLOW")}<p>Tap tile untuk rotate sampai aliran cocok.</p><div class="mini-sequence">Target: START → ─ → ┐ → │ → ┘ → CORE</div><div class="mini-sequence">Moves: ${miniGame.moves}</div><div class="mini-grid cols-4">${miniGame.current.map((p,i)=>`<button class="mini-cell pipe-cell" data-pipe="${i}">${p}</button>`).join("")}</div><div class="actions"><button class="btn primary" data-action="pipeSubmit">Submit Flow</button></div>`}function pipeRotate(i){const idx=miniGame.pieces.indexOf(miniGame.current[i]);miniGame.current[i]=miniGame.pieces[(idx+1)%miniGame.pieces.length];miniGame.moves--;if(miniGame.moves<0)return finishMiniGame(false,"Moves habis.");renderPipeFlowMiniGame()}function pipeSubmit(){const ok=miniGame.current.join("")===miniGame.answer.join("");finishMiniGame(ok,ok?"Data flow tersambung.":"Flow masih rusak.")}
function createSignalTiming(q){const zoneStart=rand(25,60),base=state.owned.tool_signal?34:28,zoneSize=clamp(base-q.difficulty*4+skillBonus("ai"),12,36);return{type:"signal",name:"Signal Timing",cursor:0,dir:1,zoneStart,zoneEnd:zoneStart+zoneSize,speed:4+q.difficulty}}function renderSignalTimingMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Signal Timing","QUICK HACK")}<p>Tap STOP saat cursor putih berada di zona hijau.</p><div class="signal-box"><div class="signal-zone" style="left:${miniGame.zoneStart}%;width:${miniGame.zoneEnd-miniGame.zoneStart}%"></div><div class="signal-cursor" id="signalCursor"></div></div><div class="actions"><button class="btn primary" data-action="signalStop">STOP</button></div>`;clearInterval(signalTimer);signalTimer=setInterval(()=>{miniGame.cursor+=miniGame.dir*miniGame.speed;if(miniGame.cursor>=100){miniGame.cursor=100;miniGame.dir=-1}if(miniGame.cursor<=0){miniGame.cursor=0;miniGame.dir=1}const cur=$("signalCursor");if(cur)cur.style.left=miniGame.cursor+"%"},35)}function signalStop(){const ok=miniGame.cursor>=miniGame.zoneStart&&miniGame.cursor<=miniGame.zoneEnd;finishMiniGame(ok,ok?"Signal tepat.":"Signal miss.")}
function createMemoryPacket(q){const symbols=["◇","○","△","□","✦","⬡"],len=clamp(3+q.difficulty,3,7);return{type:"memory",name:"Memory Packet",symbols,sequence:Array.from({length:len},()=>pick(symbols)),input:[],hidden:false}}function renderMemoryPacketMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Memory Packet","DECRYPT")}<p>Ingat urutan simbol. Setelah hilang, ulangi urutannya.</p><div class="mini-sequence">${miniGame.hidden?"Sequence hidden. Masukkan urutan.":miniGame.sequence.join(" → ")}</div><div class="mini-sequence">INPUT: ${miniGame.input.length?miniGame.input.join(" → "):"-"}</div><div class="mini-grid cols-3">${miniGame.symbols.map(s=>`<button class="mini-cell" ${miniGame.hidden?`data-memory="${s}"`:"disabled"}>${s}</button>`).join("")}</div>`;if(!miniGame.hidden){clearTimeout(memoryTimer);memoryTimer=setTimeout(()=>{if(miniGame){miniGame.hidden=true;renderMemoryPacketMiniGame()}},1800+skillBonus("ai")*250)}}function memoryPick(symbol){miniGame.input.push(symbol);const pos=miniGame.input.length-1;if(miniGame.input[pos]!==miniGame.sequence[pos])return finishMiniGame(false,"Sequence memory salah.");if(miniGame.input.length===miniGame.sequence.length)return finishMiniGame(true,"Packet berhasil didekripsi.");renderMemoryPacketMiniGame()}
function createDataSorting(q){const packets=[{name:"MALWARE",cat:"Quarantine"},{name:"TOKEN",cat:"Vault"},{name:"LOG",cat:"Archive"},{name:"CACHE",cat:"Clean"},{name:"ROOTKEY",cat:"Vault"},{name:"SPAM",cat:"Quarantine"}];return{type:"sorting",name:"Data Sorting",packets:shuffle(packets).slice(0,clamp(3+q.difficulty,3,6)),index:0,mistakes:0,maxMistakes:2}}function renderDataSortingMiniGame(){const p=miniGame.packets[miniGame.index];$("modalPanel").innerHTML=`${miniHeader("Data Sorting","CLEANUP")}<p>Kirim paket data ke kategori yang benar.</p><div class="mini-sequence">PACKET: ${p.name}</div><div class="mini-sequence">Progress: ${miniGame.index+1}/${miniGame.packets.length} · Mistake: ${miniGame.mistakes}/${miniGame.maxMistakes}</div><div class="mini-grid cols-2">${["Quarantine","Vault","Archive","Clean"].map(cat=>`<button class="mini-cell" data-sort="${cat}">${cat}</button>`).join("")}</div>`}function sortPick(cat){const p=miniGame.packets[miniGame.index];if(cat!==p.cat){miniGame.mistakes++;addHeat(2);if(miniGame.mistakes>miniGame.maxMistakes)return finishMiniGame(false,"Terlalu banyak paket salah kategori.")}miniGame.index++;if(miniGame.index>=miniGame.packets.length)return finishMiniGame(true,"Semua paket disortir.");renderDataSortingMiniGame()}
function createStealthRoute(q){const routes=[{name:"HOME → PROXY → DARK RELAY → TARGET",safe:true,risk:"Low"},{name:"HOME → PUBLIC WIFI → TARGET",safe:false,risk:"High"},{name:"HOME → TRACE NODE → TARGET",safe:false,risk:"Critical"},{name:"HOME → CACHE → MIRROR → TARGET",safe:true,risk:"Medium"}];const answer=pick(routes.filter(r=>r.safe)).name;return{type:"route",name:"Stealth Route",routes:shuffle(routes),answer}}function renderStealthRouteMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Stealth Route","PATHFINDING")}<p>Pilih jalur paling aman menuju target.</p><div class="mini-grid">${miniGame.routes.map(r=>`<button class="mini-cell" data-route="${encodeURIComponent(r.name)}"><div><b>${r.name}</b><div class="mini-small">Risk: ${r.risk}</div></div></button>`).join("")}</div>`}function routePick(encoded){const route=decodeURIComponent(encoded);finishMiniGame(route===miniGame.answer,route===miniGame.answer?"Route aman dipilih.":"Route terkena scanner.")}
function createFirewallPattern(q){const patterns=[{prompt:"2, 5, 10, 17, 26, ?",answer:"37",options:["32","35","37","42"]},{prompt:"4, 8, 12, 16, ?",answer:"20",options:["18","20","22","24"]},{prompt:"1, 1, 2, 3, 5, ?",answer:"8",options:["7","8","9","10"]},{prompt:"A1 → B2 → C3 → ?",answer:"D4",options:["C4","D4","E3","B4"]}];const p=pick(patterns);return{type:"pattern",name:"Firewall Pattern",prompt:p.prompt,answer:p.answer,options:shuffle(p.options)}}function renderFirewallPatternMiniGame(){$("modalPanel").innerHTML=`${miniHeader("Firewall Pattern","LOGIC")}<p>Pecahkan pola firewall.</p><div class="mini-sequence">${miniGame.prompt}</div><div class="mini-grid cols-2">${miniGame.options.map(o=>`<button class="mini-cell" data-pattern="${o}">${o}</button>`).join("")}</div>`}function patternPick(o){finishMiniGame(o===miniGame.answer,o===miniGame.answer?"Pattern benar.":"Pattern salah.")}
function renderTerminal(){if(terminalBooted&&currentView==="terminal")return;terminalBooted=true;$("terminal").innerHTML=`<div class="grid"><div class="card span-8"><h2>Neon Terminal</h2><div class="terminal" id="termOut"><p class="line green">CYBERTRACE NEON SHELL v1.0</p><p class="line">Command fiktif: <span class="yellowtxt">scan</span>, <span class="yellowtxt">clean</span>, <span class="yellowtxt">trace</span>, <span class="yellowtxt">bounty</span>, <span class="yellowtxt">status</span>, <span class="yellowtxt">help</span></p><p class="line bluetxt">Semua command hanya simulasi game.</p></div><div class="input-row"><input id="termInput" placeholder="ketik command..."><button class="btn primary" id="termRun">Run</button></div></div><div class="card span-4"><h2>Command Effect</h2><div class="stat"><span>scan</span><span>reward kecil</span></div><div class="stat"><span>clean</span><span>turunkan Heat</span></div><div class="stat"><span>trace</span><span>cek status Heat</span></div><div class="stat"><span>bounty</span><span>kontrak mini</span></div><div class="stat"><span>status</span><span>lihat profil</span></div></div></div>`;$("termRun").addEventListener("click",runTerminal);$("termInput").addEventListener("keydown",e=>{if(e.key==="Enter")runTerminal()})}
function termPrint(html){const out=$("termOut");out.innerHTML+=html;out.scrollTop=out.scrollHeight}function runTerminal(){const input=$("termInput");const cmd=(input.value||"").trim().toLowerCase();if(!cmd)return;input.value="";termPrint(`<p class="line green">> ${cmd}</p>`);if(cmd==="help")termPrint(`<p class="line">Available: scan, clean, trace, bounty, status, clear</p>`);else if(cmd==="clear"){terminalBooted=false;renderTerminal()}else if(cmd==="status")termPrint(`<p class="line">Lv ${state.level} · REP ${fmt(state.rep)} · ₿${fmt(state.crypto)} · Heat ${Math.floor(state.heat)}% · Energy ${Math.floor(state.energy)}/${Math.floor(state.maxEnergy)}</p>`);else if(cmd==="trace")termPrint(`<p class="line yellowtxt">${state.heat<30?"Trace rendah. Aman.":state.heat<70?"Trace aktif. Hati-hati.":"Red Alert. Bersihkan jejak."}</p>`);else if(cmd==="clean"){const cost=80;if(state.crypto<cost){termPrint(`<p class="line redtxt">Crypto tidak cukup.</p>`);return}state.crypto-=cost;const down=10+skillBonus("stealth")*2+(state.owned.tool_cleaner?8:0);state.heat=clamp(state.heat-down,0,100);log(`Terminal clean: Heat -${down}.`);termPrint(`<p class="line bluetxt">Trace cleaner aktif. Heat -${down}.</p>`);renderTop();saveGame(false)}else if(cmd==="scan"){if(!spendEnergy(5)){termPrint(`<p class="line redtxt">Energy tidak cukup.</p>`);return}const roll=rand(1,100)+skillBonus("ai")*3+totalStat("speed")*.5;if(roll>46){const c=rand(45,130),e=rand(8,22);state.crypto+=c;state.exp+=e;addHeat(3);gain({});log(`Terminal scan sukses: ₿${c}, ${e} EXP.`);termPrint(`<p class="line green">Scan sukses. Dapat ₿${c} dan ${e} EXP.</p>`)}else{addHeat(9);log("Terminal scan gagal. Heat naik.");termPrint(`<p class="line redtxt">Scan gagal. Heat naik.</p>`)}renderTop();saveGame(false)}else if(cmd==="bounty"){if(!spendEnergy(10)){termPrint(`<p class="line redtxt">Energy tidak cukup.</p>`);return}const reward={crypto:rand(90,240),exp:rand(20,55),rep:rand(3,12)};gain(reward);addHeat(rand(5,12));log(`Mini bounty selesai: ₿${reward.crypto}.`);termPrint(`<p class="line green">Mini bounty selesai. Reward ₿${reward.crypto}, ${reward.exp} EXP.</p>`);renderTop();saveGame(false)}else{addHeat(2);termPrint(`<p class="line redtxt">Unknown command. Noise terdeteksi. Heat +2.</p>`);renderTop();saveGame(false)}}
function renderDungeon(){const boss=state.dungeonFloor>=5;$("dungeon").innerHTML=`<div class="grid"><div class="card span-7"><h2>Abandoned Data Center</h2><p>Dungeon server 5 lantai. Lantai 5 berisi boss Firewall Guardian.</p><div class="stat"><span>Current Floor</span><span class="value">${state.dungeonFloor}/5</span></div><div class="stat"><span>Status Boss</span><span>${state.dungeonBossDefeated?"Defeated":"Active"}</span></div><div class="actions"><button class="btn primary" data-action="enterDungeon">Enter Floor</button><button class="btn warn" data-action="exitDungeon">Exit / Reset</button></div></div><div class="card span-5"><h2>Dungeon Rules</h2><div class="stat"><span>Energy Cost</span><span>18/floor</span></div><div class="stat"><span>Normal Floor</span><span>Random enemy</span></div><div class="stat"><span>Boss Floor</span><span>${boss?"Ready":"Locked"}</span></div></div><div class="card span-12"><h2>Server Layout</h2><div class="map-nodes">${[1,2,3,4,5].map(n=>`<div class="card node ${state.dungeonFloor<n?"locked":""}"><b>Floor ${n}</b><p>${n===5?"Boss: Firewall Guardian":["Broken Login Gate","Malware Nest","Corrupted Archive","Dark Relay Hall"][n-1]}</p><span class="tag ${n===5?"red":""}">${state.dungeonFloor>n||state.dungeonBossDefeated?"Cleared":state.dungeonFloor===n?"Current":"Locked"}</span></div>`).join("")}</div></div></div>`}
function enterDungeon(){if(!spendEnergy(18))return;addHeat(8+state.dungeonFloor*2);const enemyIndex=state.dungeonFloor>=5?3:rand(0,Math.min(2,state.dungeonFloor));startBattle(clone(enemies[enemyIndex]),true)}function exitDungeon(){state.dungeonFloor=1;log("Keluar dungeon. Floor reset ke 1.");renderAll()}function startBattle(enemy,fromDungeon=false){const playerHp=120+state.level*22+skillBonus("defense")*12;state.battle={fromDungeon,playerHp,playerMaxHp:playerHp,enemyHp:enemy.hp+state.level*8,enemyMaxHp:enemy.hp+state.level*8,enemyShield:enemy.shield,enemy};log(`Battle dimulai melawan ${enemy.name}.`);showView("battle")}
function renderBattle(){const b=state.battle;if(!b){$("battle").innerHTML=`<div class="grid"><div class="card span-12"><h2>Battle Simulator</h2><p>Tidak ada battle aktif.</p><div class="actions"><button class="btn primary" data-train="0">Training Bot</button><button class="btn purple" data-train="1">Firewall Node</button></div></div></div>`;return}$("battle").innerHTML=`<div class="grid"><div class="card span-12"><h2>Cyber Battle</h2><div class="battle-area"><div class="fighter"><h3>${state.alias}</h3><div class="bar"><div class="fill" style="width:${b.playerHp/b.playerMaxHp*100}%"></div></div><p>HP ${Math.max(0,Math.floor(b.playerHp))}/${b.playerMaxHp}</p><p>Power ${Math.floor(10+state.level*3+skillBonus("cracking")*5+totalStat("power"))} · Defense ${skillBonus("defense")}</p></div><div class="fighter"><div class="enemy-art">${b.enemy.icon}</div><h3>${b.enemy.name}</h3><div class="bar"><div class="fill red" style="width:${b.enemyHp/b.enemyMaxHp*100}%"></div></div><p>HP ${Math.max(0,Math.floor(b.enemyHp))}/${b.enemyMaxHp} · Shield ${Math.max(0,Math.floor(b.enemyShield))}</p></div></div><div class="actions"><button class="btn primary" data-battle="attack">Attack</button><button class="btn purple" data-battle="decrypt">Decrypt</button><button class="btn warn" data-battle="hide">Hide</button><button class="btn" data-battle="patch">Patch</button><button class="btn danger" data-action="fleeBattle">Flee</button></div></div></div>`}
function battleAction(type){const b=state.battle;if(!b)return;let msg="",power=10+state.level*3+skillBonus("cracking")*5+totalStat("power");if(type==="attack"){let dmg=rand(power,power+22);if(b.enemyShield>0){const s=Math.min(b.enemyShield,Math.floor(dmg*.55));b.enemyShield-=s;dmg-=s}b.enemyHp-=dmg;msg=`Attack Script memberi ${dmg} damage.`}if(type==="decrypt"){let shieldDmg=rand(24,48)+skillBonus("cracking")*6+(state.owned.tool_decrypt?18:0),hpDmg=rand(8,20)+skillBonus("ai")*3;b.enemyShield-=shieldDmg;if(b.enemyShield<0){hpDmg+=Math.abs(b.enemyShield);b.enemyShield=0}b.enemyHp-=hpDmg;msg=`Decrypt Blast: shield -${shieldDmg}, HP -${hpDmg}.`}if(type==="hide"){const down=8+skillBonus("stealth")*3+totalStat("stealth")*.4;state.heat=clamp(state.heat-down,0,100);msg=`Proxy Hide aktif. Heat -${Math.floor(down)}.`}if(type==="patch"){const heal=18+skillBonus("defense")*8+skillBonus("ai")*2;b.playerHp=clamp(b.playerHp+heal,0,b.playerMaxHp);msg=`Patch Defense memulihkan ${heal} HP.`}log(msg);if(b.enemyHp<=0)return winBattle();enemyTurn();renderAll()}
function enemyTurn(){const b=state.battle;if(!b)return;let dmg=b.enemy.atk+rand(0,12)+Math.floor(state.level*1.5);dmg=Math.max(3,dmg-skillBonus("defense")*3);b.playerHp-=dmg;addHeat(rand(2,6));log(`${b.enemy.name} menyerang balik: ${dmg} damage.`);if(b.playerHp<=0)loseBattle()}function winBattle(){const b=state.battle;gain(b.enemy.reward);addHeat(b.fromDungeon?6:3);state.stats.battles++;log(`Battle menang: ${b.enemy.name}.`);if(b.fromDungeon){if(state.dungeonFloor>=5){state.dungeonBossDefeated=true;state.dungeonFloor=1;state.stats.bosses++;gain({crypto:900,exp:260,rep:90});log("Boss dungeon dikalahkan. Bonus besar diterima.");toast("BOSS DEFEATED!")}else{state.dungeonFloor++;toast("Floor cleared.")}}else toast("Battle menang.");state.battle=null;checkAchievements();renderAll()}function loseBattle(){state.crypto=Math.max(0,state.crypto-120);state.heat=clamp(state.heat+18,0,100);state.battle=null;log("Battle kalah. Crypto hilang dan Heat naik.");toast("Kamu kalah battle.");renderAll()}function fleeBattle(){if(!state.battle)return;state.battle=null;addHeat(10);log("Kabur dari battle. Heat naik.");renderAll()}
function renderShop(){$("shop").innerHTML=`<div class="grid"><div class="card span-12"><h2>Black Market & Hardware Shop</h2><p>Beli tool fiktif untuk memperkuat karakter.</p></div><div class="card span-12"><div class="shop-grid">${shopItems.map(item=>`<div class="item"><div class="item-head"><b>${item.name}</b><span class="tag">${item.type}</span></div><p>${item.desc}</p><div class="stat"><span>Price</span><span class="value">₿${fmt(item.price)}</span></div><div class="stat"><span>Stats</span><span>PWR ${item.power} · STL ${item.stealth} · SPD ${item.speed}</span></div><button class="btn primary" data-buy="${item.id}" ${state.owned[item.id]?"disabled":""}>${state.owned[item.id]?"Owned":"Buy"}</button></div>`).join("")}</div></div></div>`}function buyItem(id){const item=shopItems.find(x=>x.id===id);if(!item)return;if(state.owned[id])return toast("Item sudah dimiliki.");if(state.crypto<item.price)return toast("Crypto tidak cukup.");state.crypto-=item.price;state.owned[id]=clone(item);if(id==="tool_gpu")state.maxEnergy+=10;log(`Membeli item: ${item.name}.`);checkAchievements();renderAll();toast(`${item.name} dibeli.`)}
function renderInventory(){const items=Object.values(state.owned);$("inventory").innerHTML=`<div class="grid"><div class="card span-4"><h2>Total Stats</h2><div class="stat"><span>Power</span><span class="value">${fmt(totalStat("power"))}</span></div><div class="stat"><span>Stealth</span><span class="value">${fmt(totalStat("stealth"))}</span></div><div class="stat"><span>Speed</span><span class="value">${fmt(totalStat("speed"))}</span></div></div><div class="card span-8"><h2>Inventory Tools</h2><div class="list">${items.map(item=>`<div class="item"><div class="item-head"><b>${item.name}</b><span class="tag">${item.type}</span></div><p>${item.desc}</p><div class="stat"><span>Stats</span><span>PWR ${item.power||0} · STL ${item.stealth||0} · SPD ${item.speed||0}</span></div></div>`).join("")}</div></div></div>`}
function renderSkills(){$("skills").innerHTML=`<div class="grid"><div class="card span-12"><h2>Skill Tree</h2><p>Skill Point tersedia: <b class="green">${state.skillPoints}</b>.</p></div><div class="card span-12"><div class="skill-grid">${skills.map(skill=>`<div class="item"><div class="item-head"><b>${skill.name}</b><span class="tag">${state.skills[skill.id]}/${skill.max}</span></div><p>${skill.desc}</p><div class="bar"><div class="fill purple" style="width:${state.skills[skill.id]/skill.max*100}%"></div></div><div class="actions"><button class="btn primary" data-skill="${skill.id}" ${state.skills[skill.id]>=skill.max?"disabled":""}>Upgrade</button></div></div>`).join("")}</div></div></div>`}function upgradeSkill(id){const skill=skills.find(x=>x.id===id);if(!skill)return;if(state.skillPoints<=0)return toast("Skill Point tidak cukup.");if(state.skills[id]>=skill.max)return toast("Skill sudah maksimal.");state.skillPoints--;state.skills[id]++;if(id==="hardware"){state.maxEnergy+=8;state.energy+=8}log(`Skill upgrade: ${skill.name} Lv.${state.skills[id]}.`);renderAll()}
function renderMap(){const areas=[{name:"Public Net",req:0,desc:"Area awal, quest ringan dan training."},{name:"Local Forum",req:0,desc:"Kontrak NPC dan mini bounty."},{name:"Abandoned Server",req:0,desc:"Dungeon server rusak."},{name:"Corporate Cloud",req:250,desc:"Misi menengah dengan Heat lebih tinggi."},{name:"Dark Market",req:450,desc:"Shop risiko tinggi dan item premium."},{name:"AUREX Core",req:900,desc:"Area akhir cerita utama."}];$("map").innerHTML=`<div class="grid"><div class="card span-12"><h2>Network Map</h2><p>Area terbuka berdasarkan reputation. Klik node untuk event singkat.</p></div><div class="card span-12"><div class="map-nodes">${areas.map((a,i)=>{const locked=state.rep<a.req;return `<div class="card node ${locked?"locked":""}" data-area="${i}"><b>${a.name}</b><p>${a.desc}</p><span class="tag ${locked?"red":""}">${locked?"Need REP "+a.req:"Unlocked"}</span></div>`}).join("")}</div></div></div>`}function mapVisit(i){const areas=[{name:"Public Net",req:0},{name:"Local Forum",req:0},{name:"Abandoned Server",req:0},{name:"Corporate Cloud",req:250},{name:"Dark Market",req:450},{name:"AUREX Core",req:900}],a=areas[i];if(state.rep<a.req)return toast("Reputation belum cukup.");const reward=rand(20,90),heat=rand(2,10);if(a.name==="Dark Market"){state.crypto+=reward*2;addHeat(heat+8);log(`Mengunjungi Dark Market: deal rahasia memberi ₿${reward*2}.`);toast(`Dark Market deal: +₿${reward*2}.`)}else if(a.name==="AUREX Core")startBattle(clone(enemies[4]),false);else{state.crypto+=reward;state.exp+=rand(5,20);addHeat(heat);gain({});log(`Mengunjungi ${a.name}: menemukan cache ₿${reward}.`);toast(`${a.name}: cache ditemukan +₿${reward}.`)}renderAll()}
function renderAchievements(){$("achievements").innerHTML=`<div class="grid"><div class="card span-12"><h2>Achievements</h2><p>Achievement memberi bonus ₿150 dan 10 REP saat pertama kali terbuka.</p></div><div class="card span-12"><div class="skill-grid">${achievements.map(a=>`<div class="item"><div class="item-head"><b>${a.name}</b><span class="tag ${state.achievements[a.id]?"":"red"}">${state.achievements[a.id]?"Unlocked":"Locked"}</span></div><p>${a.desc}</p></div>`).join("")}</div></div></div>`}function renderLogs(){$("logs").innerHTML=`<div class="grid"><div class="card span-12"><h2>Activity Log</h2><div class="logbox" style="max-height:620px">${state.logs.map(x=>`<div class="item">${x}</div>`).join("")}</div></div></div>`}function randomEvent(){pick([()=>{const c=rand(80,180);state.crypto+=c;log(`Random Event: USB misterius berisi cache ₿${c}.`);toast(`USB misterius: +₿${c}.`)},()=>{const h=rand(8,18);addHeat(h);log(`Random Event: Proxy bocor. Heat +${h}.`);toast("Proxy bocor. Heat naik.")},()=>{const e=rand(18,35);state.energy=clamp(state.energy+e,0,state.maxEnergy);log(`Random Event: MIRA optimasi rig. Energy +${e}.`);toast(`Energy +${e}.`)},()=>{const r=rand(15,40);state.rep+=r;log(`Random Event: NPC memuji aksimu. REP +${r}.`);toast(`REP +${r}.`)},()=>{const cost=Math.min(state.crypto,rand(60,160));state.crypto-=cost;state.heat=clamp(state.heat-14,0,100);log(`Random Event: Cleaner anonim dibayar ₿${cost}. Heat turun.`);toast("Cleaner anonim menurunkan Heat.")}])();renderAll()}
function renderAll(){renderNav();renderTop();renderDashboard();renderQuests();if(currentView==="terminal")renderTerminal();else terminalBooted=false;renderDungeon();renderBattle();renderShop();renderInventory();renderSkills();renderMap();renderAchievements();renderLogs();saveGame(false)}
document.addEventListener("click",e=>{const t=e.target.closest("[data-view],[data-go],[data-action],[data-quest],[data-buy],[data-skill],[data-area],[data-train],[data-battle],[data-breach],[data-word],[data-node],[data-pipe],[data-memory],[data-sort],[data-route],[data-pattern]");if(!t)return;if(t.dataset.view)return showView(t.dataset.view);if(t.dataset.go)return showView(t.dataset.go);if(t.dataset.quest)return acceptQuest(t.dataset.quest);if(t.dataset.buy)return buyItem(t.dataset.buy);if(t.dataset.skill)return upgradeSkill(t.dataset.skill);if(t.dataset.area!==undefined)return mapVisit(Number(t.dataset.area));if(t.dataset.train!==undefined)return startBattle(clone(enemies[Number(t.dataset.train)]),false);if(t.dataset.battle)return battleAction(t.dataset.battle);if(t.dataset.breach!==undefined)return breachPick(Number(t.dataset.breach));if(t.dataset.word)return wordGuess(t.dataset.word);if(t.dataset.node)return nodePick(t.dataset.node);if(t.dataset.pipe!==undefined)return pipeRotate(Number(t.dataset.pipe));if(t.dataset.memory)return memoryPick(t.dataset.memory);if(t.dataset.sort)return sortPick(t.dataset.sort);if(t.dataset.route)return routePick(t.dataset.route);if(t.dataset.pattern)return patternPick(t.dataset.pattern);const a=t.dataset.action;if(a==="rest")return rest();if(a==="daily")return claimDaily();if(a==="random")return randomEvent();if(a==="startQuest")return startActiveQuest();if(a==="cancelQuest")return cancelQuest();if(a==="abortMini")return finishMiniGame(false,"Manual abort.");if(a==="breachUndo")return breachUndo();if(a==="pipeSubmit")return pipeSubmit();if(a==="signalStop")return signalStop();if(a==="enterDungeon")return enterDungeon();if(a==="exitDungeon")return exitDungeon();if(a==="fleeBattle")return fleeBattle()});
function boot(){$("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});$("menuBtn").addEventListener("click",()=>toggleSidebar(true));$("closeSidebarBtn").addEventListener("click",()=>toggleSidebar(false));$("overlay").addEventListener("click",()=>toggleSidebar(false));$("saveBtn").addEventListener("click",()=>saveGame(true));$("resetBtn").addEventListener("click",resetGame);window.addEventListener("resize",()=>{if(window.innerWidth>1050)toggleSidebar(false)});renderAll();setInterval(()=>{if(state.energy<state.maxEnergy){state.energy=Math.min(state.maxEnergy,state.energy+1);renderTop();if(currentView==="dashboard")renderDashboard();saveGame(false)}},12000)}
try{boot()}catch(e){console.error("CYBERTRACE BOOT ERROR:",e);document.body.innerHTML=`<div style="padding:20px;color:#e8faff;background:#050816;min-height:100vh;font-family:Arial"><h2>CYBERTRACE gagal boot</h2><p>Ada error JavaScript. Buka Console untuk detail.</p><pre style="white-space:pre-wrap;background:#111a3f;padding:12px;border-radius:12px;color:#00ffcc">${String(e&&e.message?e.message:e)}</pre></div>`}
})();
</script>
</body>
</html>
