<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CYBERTRACE: Neon Breach</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="overlay" id="overlay"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <button class="close-sidebar" id="closeSidebarBtn" type="button">✕</button>

      <div class="brand">
        <h1>CYBERTRACE</h1>
        <p>Neon Breach · Hacker RPG Simulasi</p>
      </div>

      <button class="profile profile-btn" id="profileBtn" type="button">
        <div class="avatar" id="avatarText">ZB</div>
        <div class="profile-info">
          <b id="aliasText">ZeroByte</b>
          <span id="rankText">Script Kiddie</span>
          <small id="usernameText">@zerobyte</small>
        </div>
      </button>

      <nav class="nav" id="nav"></nav>

      <div class="side-actions side-actions-3">
        <button class="btn" id="saveBtn" type="button">Save</button>
        <button class="btn" id="langBtn" type="button">EN</button>
        <button class="btn danger" id="resetBtn" type="button">Reset</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" type="button">☰</button>
        <div class="ticker" id="ticker">&gt; booting neon shell...</div>
        <div class="heat-pill" id="heatPill">HEAT 0%</div>
      </header>

      <section class="content">
        <div id="dashboard" class="view active"></div>
        <div id="quests" class="view"></div>
        <div id="terminal" class="view"></div>
        <div id="dungeon" class="view"></div>
        <div id="battle" class="view"></div>
        <div id="shop" class="view"></div>
        <div id="inventory" class="view"></div>
        <div id="skills" class="view"></div>
        <div id="map" class="view"></div>
        <div id="achievements" class="view"></div>
        <div id="logs" class="view"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="modal">
    <div class="modal-panel" id="modalPanel"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
